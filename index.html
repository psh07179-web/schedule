<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 정리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2233">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스케줄">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #1a2233;
    overflow-x: hidden;
  }

  /* ── 화면 전환 래퍼 ── */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    will-change: transform;
    overflow-y: auto;
  }
  #mainScreen { transform: translateX(0); z-index: 1; }
  #mainScreen.slide-out { transform: translateX(-30%); opacity: 0.5; pointer-events: none; }
  #detailScreen { transform: translateX(100%); z-index: 2; }
  #detailScreen.slide-in { transform: translateX(0); }

  /* ── 공통 헤더 ── */
  .app-header {
    background: #1a2233;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .month-nav-bar {
    background: #151c2a;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .app-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .undo-btn {
    margin-left: auto;
    background: none;
    border: 1px solid #3a4a60;
    color: #a0b0c8;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s, opacity 0.15s;
  }
  .undo-btn:hover:not(:disabled) { background: #253348; color: #fff; }
  .undo-btn:disabled { opacity: 0.35; cursor: default; }
  .undo-btn-detail { padding: 6px 10px; font-size: 14px; }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .month-nav button {
    background: none;
    border: 1px solid #3a4a60;
    color: #a0b0c8;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .month-nav button:hover { background: #2a3a50; color: #fff; }
  .month-label {
    font-size: 15px;
    font-weight: 500;
    color: #c8d8ec;
    min-width: 80px;
    text-align: center;
  }

  /* ── 탭 ── */
  .tabs-wrapper {
    background: #1a2233;
    border-bottom: 2px solid #2e4060;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
  }
  /* 철수 탭 고정 영역 */
  .tabs-fixed {
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    border-right: 2px solid #2e4060;
    background: #1a2233;
    z-index: 2;
  }
  /* 날짜 탭 스크롤 영역 */
  .tabs-scroll {
    flex: 1;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: #3a5070 transparent;
  }
  .tabs-scroll::-webkit-scrollbar { height: 4px; }
  .tabs-scroll::-webkit-scrollbar-thumb { background: #3a5070; border-radius: 2px; }
  .tabs-inner {
    display: flex;
    padding: 0 8px;
    gap: 2px;
    min-width: max-content;
    height: 100%;
  }
  .special-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 14px 7px;
    min-width: 56px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background 0.15s;
    border-bottom: 3px solid transparent;
  }
  .special-tab:hover { background: #253348; }
  .special-tab.active { background: #f0f4f8; border-bottom-color: #e8a040; }
  .special-tab.boru-tab.active { border-bottom-color: #b0b8c8; }
  .special-tab.boru-tab .tab-label { color: #b0b8c8; }
  .special-tab.boru-tab.active .tab-label { color: #607080; }
  .special-tab .tab-icon { font-size: 14px; line-height: 1; }
  .special-tab .tab-label { font-size: 11px; font-weight: 700; color: #e8c080; margin-top: 2px; letter-spacing: 0.5px; }
  .special-tab.active .tab-label { color: #b07010; }
  .day-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 10px 7px;
    min-width: 48px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background 0.15s;
    border-bottom: 3px solid transparent;
    position: relative;
  }
  .day-tab:hover { background: #253348; }
  .day-tab.active { background: #f0f4f8; border-bottom-color: #4a8fe8; }
  .day-tab .day-num { font-size: 15px; font-weight: 700; color: #c8d8ec; line-height: 1; }
  .day-tab .day-name { font-size: 10px; color: #6a80a0; margin-top: 2px; }
  .day-tab.active .day-num { color: #1a2233; }
  .day-tab.active .day-name { color: #4a8fe8; }
  .day-tab.sun .day-num { color: #e86060; }
  .day-tab.sat .day-num { color: #4a8fe8; }
  .day-tab.sun.active .day-num { color: #c04040; }
  .day-tab.sat.active .day-num { color: #2a6ec8; }
  .day-tab.today-tab::after {
    content: '';
    position: absolute;
    top: 5px; right: 5px;
    width: 5px; height: 5px;
    background: #f0a030;
    border-radius: 50%;
  }

  /* ── 메인 메모 목록 ── */
  .memo-area {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .memo-date-label {
    font-size: 13px;
    font-weight: 500;
    color: #6a80a0;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .memo-date-label span {
    font-size: 22px;
    font-weight: 700;
    color: #1a2233;
    margin-right: 6px;
  }
  .memo-lines { display: flex; flex-direction: column; gap: 10px; }

  .memo-line {
    display: flex;
    align-items: stretch;
    gap: 10px;
    background: #fff;
    border-radius: 8px;
    padding: 0 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    transition: box-shadow 0.15s, background 0.2s;
    cursor: pointer;
  }
  .memo-line:hover { box-shadow: 0 2px 10px rgba(74,143,232,0.13); }
  .memo-line.done { background: #f4faf4; }

  .memo-check { display: none !important; }

  .memo-line-num { display: none; }

  /* 목록에서 두 줄 미리보기: 1번째 줄·2번째 줄을 각각 독립적으로 말줄임 처리 */
  .memo-preview {
    flex: 1;
    font-size: 14px;
    color: #1a2233;
    padding: 10px 0;
    line-height: 21px;
    min-height: 62px; /* 21px * 2줄 + padding 10px * 2 */
    align-self: stretch;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    transition: color 0.2s;
    user-select: none;
  }
  .memo-preview-row {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    word-break: keep-all;
  }
  .memo-preview.empty { color: #c8d0dc; font-style: italic; min-height: 41px; }
  .memo-preview.empty .memo-preview-row { white-space: normal; text-overflow: clip; }
  .memo-line.done .memo-preview {
    color: #80a080;
    text-decoration: line-through;
    text-decoration-color: #40b860;
  }

  .done-badge { display: none !important; }

  /* 상세보기 화살표 아이콘 */
  .memo-arrow {
    color: #c8d8ec;
    font-size: 16px;
    flex-shrink: 0;
    user-select: none;
    align-self: center;
  }

  .memo-delete {
    width: 26px; height: 26px; min-width: 26px;
    border-radius: 6px; border: none;
    background: transparent; color: #d0d8e4;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; line-height: 1; padding: 0;
    align-self: center;
  }
  .memo-delete:hover { background: #fee2e2; color: #e84040; }

  /* ── 상태 선택 칸 (상태1 · 상태2, 위아래) ── */
  .status-col {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
    align-self: stretch;
    justify-content: center;
    padding: 6px 0;
    position: relative;
  }

  /* 뱃지 버튼 — 담당자 버튼과 동일 크기/스타일 */
  .st-badge {
    width: 38px; height: 26px;
    border-radius: 6px;
    border: none;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.3px;
    transition: opacity 0.15s, transform 0.1s;
    user-select: none;
    background: #e8edf4;
    color: #8090a8;
    white-space: nowrap;
    border: 1.5px dashed #c8d0dc;
  }
  .st-badge:hover { opacity: 0.85; transform: scale(1.05); }
  .st-badge.has-val { border-style: solid; border-color: transparent; }

  /* 항목별 색상 — 요청한 순서/색상 */
  .st-badge[data-val="7톤"]   { background: #22a55e; color: #fff; }
  .st-badge[data-val="4톤"]   { background: #ffe600; color: #5a3e00; }
  .st-badge[data-val="1톤"]   { background: #ffffff; color: #333d4d; border: 1.5px solid #c8d0dc; }
  .st-badge[data-val="화물"]  { background: #6b7686; color: #fff; }
  .st-badge[data-val="주기장"]{ background: #8a5a34; color: #fff; }
  .st-badge[data-val="AS"]    { background: #ccff00; color: #3a4400; }
  .st-badge[data-val="준비중"]{ background: #4fc3f7; color: #06405c; }
  .st-badge[data-val="준비됨"]{ background: #2b7ee8; color: #fff; }
  .st-badge[data-val="완료"]  { background: #ef4444; color: #fff; }
  .st-badge[data-val="동혁"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="태진"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="규형"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="성민"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="성호"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="서진"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="홍식"]  { background: #c9a6f0; color: #4a2d70; }
  .st-badge[data-val="보류"]  { background: #b0b8c8; color: #fff; }

  /* 드롭다운 팝업 */
  .st-dropdown {
    display: none;
    position: absolute;
    top: 0; left: 44px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    padding: 8px;
    z-index: 200;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    min-width: 160px;
  }
  .st-dropdown.open { display: grid; }
  .st-drop-item {
    padding: 6px 4px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    color: #fff;
    transition: opacity 0.15s, transform 0.1s;
    user-select: none;
  }
  .st-drop-item:hover { opacity: 0.85; transform: scale(1.05); }
  .st-drop-item.st-clear {
    background: #e8edf4; color: #8090a8;
    border: 1.5px dashed #c8d0dc;
    grid-column: 1 / -1; font-size: 10px;
  }
  .st-drop-item[data-val="7톤"]   { background: #22a55e; color: #fff; }
  .st-drop-item[data-val="4톤"]   { background: #ffe600; color: #5a3e00; }
  .st-drop-item[data-val="1톤"]   { background: #ffffff; color: #333d4d; border: 1.5px solid #c8d0dc; }
  .st-drop-item[data-val="화물"]  { background: #6b7686; color: #fff; }
  .st-drop-item[data-val="주기장"]{ background: #8a5a34; color: #fff; }
  .st-drop-item[data-val="AS"]    { background: #ccff00; color: #3a4400; }
  .st-drop-item[data-val="준비중"]{ background: #4fc3f7; color: #06405c; }
  .st-drop-item[data-val="준비됨"]{ background: #2b7ee8; color: #fff; }
  .st-drop-item[data-val="완료"]  { background: #ef4444; color: #fff; }
  .st-drop-item[data-val="동혁"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="태진"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="규형"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="성민"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="성호"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="서진"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="홍식"]  { background: #c9a6f0; color: #4a2d70; }
  .st-drop-item[data-val="보류"]  { background: #b0b8c8; color: #fff; }

  /* ── 드래그 앤 드롭 ── */
  .drag-handle {
    width: 20px; min-width: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: grab;
    padding: 8px 2px;
    opacity: 0.3;
    transition: opacity 0.15s;
    flex-shrink: 0;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .memo-line:hover .drag-handle { opacity: 0.6; }
  .drag-handle span {
    display: block;
    width: 14px; height: 2px;
    background: #607080;
    border-radius: 2px;
  }

  .memo-line.dragging {
    opacity: 0.4;
    background: #e8f0fb !important;
  }
  .memo-line.drag-over-top {
    border-top: 2px solid #4a8fe8;
  }
  .memo-line.drag-over-bottom {
    border-bottom: 2px solid #4a8fe8;
  }
  .save-btn button {
    background: #1a2233; color: #fff; border: none;
    border-radius: 6px; padding: 10px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    letter-spacing: 0.3px; transition: background 0.15s;
  }
  .save-btn button:hover { background: #2a3a50; }
  .save-status {
    font-size: 12px; color: #4a8fe8;
    margin-top: 8px; text-align: right;
    height: 16px; transition: opacity 0.3s;
  }

  /* ── 상세 화면 ── */
  #detailScreen { background: #f0f4f8; }

  .detail-header {
    background: #1a2233;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: #4a8fe8;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .back-btn:hover { background: #253348; }
  .back-btn .back-arrow { font-size: 18px; }
  .detail-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: #c8d8ec;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .detail-save-btn {
    background: #4a8fe8;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .detail-save-btn:hover { background: #2a6ec8; }

  .detail-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* 상세 제목 한 줄 입력 */
  .detail-title-input {
    width: 100%;
    border: none;
    border-bottom: 2px solid #d0dce8;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #1a2233;
    padding: 8px 0 10px;
    background: transparent;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    line-height: 1.3;
  }
  .detail-title-input:focus { border-bottom-color: #4a8fe8; }
  .detail-title-input::placeholder { color: #c8d0dc; font-weight: 400; }

  /* 상세 내용 여러 줄 textarea */
  .detail-content {
    flex: 1;
    width: 100%;
    min-height: 300px;
    border: none;
    border-radius: 10px;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: #1a2233;
    padding: 16px;
    background: #fff;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    resize: vertical;
    line-height: 1.8;
    transition: box-shadow 0.2s;
  }
  .detail-content:focus { box-shadow: 0 0 0 2px #4a8fe8, 0 2px 12px rgba(74,143,232,0.12); }
  .detail-content::placeholder { color: #c8d0dc; }

  .detail-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    font-size: 12px;
    color: #90a0b8;
  }
  .detail-check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .detail-check-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #c8d8ec;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .detail-check-circle.checked { border-color: #40b860; background: #40b860; }
  .detail-check-circle.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
  .detail-check-label { font-size: 13px; color: #6a80a0; }

  .detail-saved-msg {
    font-size: 12px;
    color: #40b860;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* ── 상세 이동 섹션 ── */
  .detail-move-section {
    margin-top: 18px;
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .detail-move-title {
    font-size: 12px;
    font-weight: 700;
    color: #6a80a0;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .detail-move-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .detail-move-label {
    font-size: 12px;
    color: #8090a8;
    flex-shrink: 0;
  }
  .detail-move-select {
    flex: 1;
    min-width: 100px;
    padding: 6px 10px;
    border: 1.5px solid #d0dce8;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: #1a2233;
    background: #f8fafb;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: auto;

  <div style="flex:1; overflow-y:auto;">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC0oKhiIYVqE3-KUYavxApuH5wCuX4WZW4",
    authDomain: "scheduler-1203c.firebaseapp.com",
    databaseURL: "https://scheduler-1203c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "scheduler-1203c",
    storageBucket: "scheduler-1203c.firebasestorage.app",
    messagingSenderId: "107615593812",
    appId: "1:107615593812:web:3a8472f6f5a6e8d52f94c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 로컬 저장 직후, 그보다 오래된(stale) 원격 스냅샷이 뒤늦게 도착해
  // 화면을 덮어쓰는 것을 막기 위한 가드
  const ECHO_GUARD_MS = 2500;
  const lastSavedAt = {}; // key -> timestamp of last local save

  // Firebase로 saveData/loadData 교체
  window._fbSave = function(key, data) {
    lastSavedAt[key] = Date.now();
    set(ref(db, 'schedules/' + key), data).catch(e => console.error('저장 오류', e));
    // 로컬에도 캐시
    try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
  };

  window._fbLoad = function(key) {
    // 일단 로컬 캐시 반환 (빠른 렌더용)
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  };

  // Firebase에서 현재 날짜 데이터 실시간 수신
  let currentKey = null;
  let currentUnsub = null;
  window._fbWatch = function(key, callback) {
    if (currentKey === key) return;
    // 이전 키를 계속 구독한 채로 남겨두면 리스너가 계속 쌓여서
    // 예상치 못한 시점에 재렌더링을 유발할 수 있으므로 먼저 해제
    if (currentUnsub) { currentUnsub(); currentUnsub = null; }
    currentKey = key;
    currentUnsub = onValue(ref(db, 'schedules/' + key), snap => {
      // 방금 이 기기에서 저장한 직후라면, 뒤늦게 도착한 이전(stale) 스냅샷일
      // 가능성이 높으므로 무시하고 화면을 되돌리지 않는다.
      if (Date.now() - (lastSavedAt[key] || 0) < ECHO_GUARD_MS) return;
      const data = snap.val();
      if (data) {
        try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
        callback(data);
      }
    });
  };

  // 저장 직전 서버의 "진짜 최신" 데이터를 한 번 조회 (병합 저장용, 캐시 사용 안 함)
  window._fbGetFresh = async function(key) {
    try {
      const snap = await get(ref(db, 'schedules/' + key));
      return snap.exists() ? snap.val() : null;
    } catch(e) { return null; }
  };

  // ── 자동 백업 (하루 1회, 그날 최초 상태 보관) ──
  window._fbBackupExists = async function(key, dateStr) {
    try {
      const snap = await get(ref(db, 'backups/' + key + '/' + dateStr));
      return snap.exists();
    } catch(e) { return false; }
  };
  window._fbBackupWrite = function(key, dateStr, data) {
    return set(ref(db, 'backups/' + key + '/' + dateStr), data).catch(()=>{});
  };
  window._fbBackupRead = async function(key, dateStr) {
    try {
      const snap = await get(ref(db, 'backups/' + key + '/' + dateStr));
      return snap.exists() ? snap.val() : null;
    } catch(e) { return null; }
  };
  window._fbBackupDates = async function(key) {
    try {
      const snap = await get(ref(db, 'backups/' + key));
      return snap.exists() ? Object.keys(snap.val()) : [];
    } catch(e) { return []; }
  };

  const DAYS_KO = ['일','월','화','수','목','금','토'];
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const LINE_COUNT = 20;
  const SPECIAL_TAB = 'cheolsu';
  const CHEOLSU_KEY = 'sched_cheolsu_global';
  const BORU_TAB = 'boru';
  const BORU_KEY = 'sched_boru_global';

  const now = new Date();
  let curYear = now.getFullYear();
  let curMonth = now.getMonth();
  let selectedDay = now.getDate();
  let detailIndex = -1; // 현재 열린 상세 인덱스

  // ── 스토리지 ──
  const storageKey = (y, m, d) => d === SPECIAL_TAB ? CHEOLSU_KEY : d === BORU_TAB ? BORU_KEY : `sched_${y}_${m+1}_${d}`;

  const PERSONS = ['7톤','4톤','성민','태진','규형','성호','서진','홍식','동혁','화물','준비됨','보류'];

  function emptyData() {
    return {
      lines:   Array(LINE_COUNT).fill(''),
      details: Array(LINE_COUNT).fill(''),
      checked: Array(LINE_COUNT).fill(false),
      persons: Array(LINE_COUNT).fill(''),
      status1: Array(LINE_COUNT).fill(''),
      status2: Array(LINE_COUNT).fill('')
    };
  }

  // 각 키(날짜)별로 "가장 최근에 내가 읽은 상태"를 기억해뒀다가, 저장 시 병합 기준(before)으로 사용
  const lastLoadedSnapshot = {};

  function mergeDayData(before, local, remote) {
    const fields = ['lines', 'details', 'checked', 'persons', 'status1', 'status2'];
    const merged = {};
    for (const f of fields) {
      const b = (before && before[f]) || [];
      const l = (local  && local[f])  || [];
      const r = (remote && remote[f]) || [];
      const emptyVal = (f === 'checked') ? false : '';
      const out = [];
      for (let i = 0; i < LINE_COUNT; i++) {
        const bv = b[i] !== undefined ? b[i] : emptyVal;
        const lv = l[i] !== undefined ? l[i] : emptyVal;
        const rv = r[i] !== undefined ? r[i] : emptyVal;
        if (lv !== bv) {
          out.push(lv);       // 이번 조작에서 직접 바꾼 값은 항상 유지
        } else if (rv !== bv) {
          out.push(rv);       // 그 사이 다른 기기/사용자가 바꾼 값을 반영
        } else {
          out.push(bv);
        }
      }
      merged[f] = out;
    }
    return merged;
  }

  async function saveDataByKey(key, data) {
    const before = lastLoadedSnapshot[key] || null;
    let finalData = data;

    // 저장 직전 서버의 실제 최신 상태를 한 번 확인해서, 그 사이 다른 기기가
    // 추가/변경한 내용이 있으면 내 변경 내용과 합쳐서 저장한다 (덮어쓰기 방지)
    if (before && window._fbGetFresh) {
      try {
        const remoteRaw = await window._fbGetFresh(key);
        if (remoteRaw) {
          const remote = normalizeData(remoteRaw);
          finalData = mergeDayData(before, data, remote);
        }
      } catch(e) {}
    }

    lastLoadedSnapshot[key] = JSON.parse(JSON.stringify(finalData));

    if (window._fbSave) {
      window._fbSave(key, finalData);
    } else {
      try { localStorage.setItem(key, JSON.stringify(finalData)); } catch(e) {}
    }

    // 병합 결과가 지금 내가 편집하던 내용과 다를 수 있으므로(다른 기기가 추가한 항목 반영)
    // 현재 보고 있는 탭이면 화면을 최종 결과로 다시 그려준다
    if (key === storageKey(curYear, curMonth, selectedDay)) {
      renderMemoLines();
    }
  }

  function saveData(y, m, d, data) {
    saveDataByKey(storageKey(y, m, d), data);
  }

  function loadData(y, m, d) {
    const key = storageKey(y, m, d);
    // Firebase 실시간 감지 등록
    if (window._fbWatch) {
      window._fbWatch(key, (data) => {
        // 다른 기기에서 변경 시 자동 갱신
        const normalized = normalizeData(data);
        try { localStorage.setItem(key, JSON.stringify(normalized)); } catch(e) {}
        lastLoadedSnapshot[key] = JSON.parse(JSON.stringify(normalized));
        if (storageKey(curYear, curMonth, selectedDay) === key) {
          renderMemoLines();
        }
      });
    }
    try {
      const raw = (window._fbLoad ? window._fbLoad(key) : null)
                  || JSON.parse(localStorage.getItem(key));
      const result = raw ? normalizeData(raw) : emptyData();
      lastLoadedSnapshot[key] = JSON.parse(JSON.stringify(result));
      return result;
    } catch { return emptyData(); }
  }

  function normalizeData(p) {
    if (!p) return emptyData();
    if (Array.isArray(p)) {
      return { lines: p.concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT), details: Array(LINE_COUNT).fill(''), checked: Array(LINE_COUNT).fill(false), persons: Array(LINE_COUNT).fill('') };
    }
    return {
      lines:   (p.lines   || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      details: (p.details || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      checked: (p.checked || []).concat(Array(LINE_COUNT).fill(false)).slice(0, LINE_COUNT),
      persons: (p.persons || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      status1: (p.status1 || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      status2: (p.status2 || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT)
    };
  }

  // ── 하루 1회 자동 백업 (그날 최초로 연 시점의 상태를 보관) ──
  function todayDateStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  const backupChecked = {}; // key -> 이번 세션에서 이미 확인/생성했는지
  async function ensureDailyBackup(key) {
    if (backupChecked[key]) return;
    backupChecked[key] = true;
    if (!window._fbBackupExists) return;
    try {
      const dateStr = todayDateStr();
      const exists = await window._fbBackupExists(key, dateStr);
      if (exists) return;
      let snapshot = window._fbGetFresh ? await window._fbGetFresh(key) : null;
      if (!snapshot) {
        try { snapshot = JSON.parse(localStorage.getItem(key)); } catch(e) { snapshot = null; }
      }
      if (snapshot) await window._fbBackupWrite(key, dateStr, snapshot);
    } catch(e) {}
  }

  function collectCurrentData() {
    const rows = document.querySelectorAll('.memo-line');
    const data = loadData(curYear, curMonth, selectedDay);
    rows.forEach(row => {
      const i = parseInt(row.dataset.index);
      const preview = row.querySelector('.memo-preview');
      const check   = row.querySelector('.memo-check');
      const badges  = row.querySelectorAll('.st-badge');
      if (preview) data.lines[i]   = preview.dataset.value || '';
      if (check)   data.checked[i] = check.classList.contains('checked');
      if (badges[0]) data.status1[i] = badges[0].dataset.val || '';
      if (badges[1]) data.status2[i] = badges[1].dataset.val || '';
    });
    return data;
  }

  // ── 되돌리기 (Undo) ──
  const UNDO_LIMIT = 8; // 5~10회 정도 되돌리기 가능
  const undoStack = [];

  // 특정 날짜(y,m,d)의 "변경 전" 데이터를 스냅샷으로 떠둔다
  function snapshotFor(y, m, d) {
    return { key: storageKey(y, m, d), data: loadData(y, m, d) };
  }

  // 하나의 undo 단계로 묶어서 저장 (여러 날짜에 걸친 이동 작업 등도 한 번에 되돌릴 수 있도록 배열로 받음)
  function pushUndo(...snapshots) {
    const entry = snapshots.map(s => ({ key: s.key, data: JSON.parse(JSON.stringify(s.data)) }));
    undoStack.push(entry);
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    updateUndoButton();
  }

  function updateUndoButton() {
    const n = undoStack.length;
    const mainBtn = document.getElementById('undoBtnMain');
    if (mainBtn) {
      mainBtn.disabled = n === 0;
      mainBtn.textContent = n ? `↺ 되돌리기 (${n})` : '↺ 되돌리기';
      mainBtn.title = n ? `되돌리기 (${n}단계 가능)` : '되돌릴 작업이 없습니다';
    }
    const detailBtn = document.getElementById('undoBtnDetail');
    if (detailBtn) {
      detailBtn.disabled = n === 0;
      detailBtn.title = n ? `되돌리기 (${n}단계 가능)` : '되돌릴 작업이 없습니다';
    }
  }

  function performUndo() {
    if (!undoStack.length) return;
    const entry = undoStack.pop();
    const curKey = storageKey(curYear, curMonth, selectedDay);
    let touchedCurrent = false;
    entry.forEach(({ key, data }) => {
      saveDataByKey(key, data);
      if (key === curKey) touchedCurrent = true;
    });
    if (document.getElementById('detailScreen').classList.contains('slide-in')) {
      closeDetail();
    } else if (touchedCurrent) {
      renderMemoLines();
    }
    updateUndoButton();
  }

  async function performBackupRestore() {
    if (!window._fbBackupRead) {
      alert('백업 기능은 온라인 상태에서만 사용할 수 있습니다.');
      return;
    }
    const key = storageKey(curYear, curMonth, selectedDay);
    const dateStr = todayDateStr();
    let backup = await window._fbBackupRead(key, dateStr);
    let usedDate = dateStr;
    if (!backup) {
      const dates = window._fbBackupDates ? await window._fbBackupDates(key) : [];
      if (!dates.length) {
        alert('이 날짜에는 저장된 백업이 없습니다.');
        return;
      }
      dates.sort();
      usedDate = dates[dates.length - 1];
      backup = await window._fbBackupRead(key, usedDate);
    }
    if (!backup) {
      alert('백업을 불러오지 못했습니다.');
      return;
    }
    if (!confirm(`${usedDate} 백업(그날 최초 상태)으로 되돌리시겠습니까?\n지금 화면의 내용은 사라지며, 필요하면 "되돌리기" 버튼으로만 복구할 수 있습니다.`)) return;

    const before = snapshotFor(curYear, curMonth, selectedDay);
    const restored = normalizeData(backup);
    saveData(curYear, curMonth, selectedDay, restored);
    pushUndo(before);
    renderMemoLines();
  }

  // ── 탭 렌더 ──
  function renderTabs() {
    const fixed = document.getElementById('tabsFixed');
    const inner = document.getElementById('tabsInner');
    fixed.innerHTML = '';
    inner.innerHTML = '';

    const st = document.createElement('div');
    st.className = 'special-tab' + (selectedDay === SPECIAL_TAB ? ' active' : '');
    st.innerHTML = `<span class="tab-icon">👤</span><span class="tab-label">철수</span>`;
    st.addEventListener('click', () => selectDay(SPECIAL_TAB));
    fixed.appendChild(st);

    const bt = document.createElement('div');
    bt.className = 'special-tab boru-tab' + (selectedDay === BORU_TAB ? ' active' : '');
    bt.innerHTML = `<span class="tab-icon">⏸</span><span class="tab-label">보류</span>`;
    bt.addEventListener('click', () => selectDay(BORU_TAB));
    fixed.appendChild(bt);

    const dim = new Date(curYear, curMonth + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      const date = new Date(curYear, curMonth, d);
      const dow = date.getDay();
      const tab = document.createElement('div');
      tab.className = 'day-tab';
      if (dow === 0) tab.classList.add('sun');
      if (dow === 6) tab.classList.add('sat');
      if (curYear === now.getFullYear() && curMonth === now.getMonth() && d === now.getDate()) tab.classList.add('today-tab');
      if (d === selectedDay) tab.classList.add('active');
      tab.innerHTML = `<span class="day-num">${d}</span><span class="day-name">${DAYS_KO[dow]}</span>`;
      tab.addEventListener('click', () => selectDay(d));
      inner.appendChild(tab);
    }

    setTimeout(() => {
      const a = document.querySelector('.tabs-inner .day-tab.active');
      if (a) a.scrollIntoView({ inline: 'center', block: 'nearest' });
    }, 50);
  }

  // 선택 가능한 전체 항목 목록
  const ALL_STATUS_ITEMS = [
    { val:'7톤',   color:'#22a55e', textColor:'#fff' },     // 녹색
    { val:'4톤',   color:'#ffe600', textColor:'#5a3e00' },  // 샛노란색

    { val:'준비됨',color:'#2b7ee8', textColor:'#fff' },     // 파란색
    { val:'완료',  color:'#ef4444', textColor:'#fff' },     // 빨간색

  function makeStatusSlot(currentVal, row) {
    const wrap = document.createElement('div');
    wrap.style.position = 'relative';

    const badge = document.createElement('button');
    badge.className = 'st-badge' + (currentVal ? ' has-val' : '');
    badge.dataset.val = currentVal || '';
    badge.setAttribute('data-val', currentVal || '');
    badge.textContent = currentVal || '··';

    const dropdown = document.createElement('div');
    dropdown.className = 'st-dropdown';

    // 초기화
    const clearItem = document.createElement('div');
    clearItem.className = 'st-drop-item st-clear';
    clearItem.textContent = '선택 안 함';
    clearItem.addEventListener('click', e => {
      e.stopPropagation();
      const before = snapshotFor(curYear, curMonth, selectedDay);
      badge.dataset.val = '';
      badge.setAttribute('data-val', '');
      badge.textContent = '··';
      badge.className = 'st-badge';
      dropdown.classList.remove('open');
      saveData(curYear, curMonth, selectedDay, collectCurrentData());
      pushUndo(before);
    });
    dropdown.appendChild(clearItem);

    ALL_STATUS_ITEMS.forEach(item => {
      const el = document.createElement('div');
      el.className = 'st-drop-item';
      el.dataset.val = item.val;
      el.textContent = item.val;
      el.addEventListener('click', e => {
        e.stopPropagation();
        const before = snapshotFor(curYear, curMonth, selectedDay);
        badge.dataset.val = item.val;
        badge.setAttribute('data-val', item.val);
        badge.textContent = item.val;
        badge.className = 'st-badge has-val';
        dropdown.classList.remove('open');
        saveData(curYear, curMonth, selectedDay, collectCurrentData());
        pushUndo(before);
      });
      dropdown.appendChild(el);
    });

    badge.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = dropdown.classList.contains('open');
      // 모든 드롭다운 닫기
      document.querySelectorAll('.st-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) dropdown.classList.add('open');
    });

    wrap.appendChild(badge);
    wrap.appendChild(dropdown);
    return wrap;
  }

  // ── 메인 목록 렌더 ──
  function buildMemoRow(i, lineText, isDone, s1Val, s2Val, detailText) {
    const row = document.createElement('div');
    row.className = 'memo-line' + (isDone ? ' done' : '');
    row.dataset.index = i;

    // 체크 (숨김)
    const check = document.createElement('div');
    check.className = 'memo-check' + (isDone ? ' checked' : '');
    check.addEventListener('click', e => {
      e.stopPropagation();
      check.classList.toggle('checked');
      row.classList.toggle('done', check.classList.contains('checked'));
      saveData(curYear, curMonth, selectedDay, collectCurrentData());
    });

    const num = document.createElement('span');
    num.className = 'memo-line-num';
    num.textContent = i + 1;

    // ── 상태 칸 (위·아래 2개) ──
    const statusCol = document.createElement('div');
    statusCol.className = 'status-col';
    statusCol.appendChild(makeStatusSlot(s1Val, row));
    statusCol.appendChild(makeStatusSlot(s2Val, row));

    // 미리보기 (2줄) - 상세 내용의 1번째 줄(엔터 전)과 2번째 줄(엔터 다음 줄)을
    // 각각 독립된 한 줄로 잘라서(말줄임표) 보여준다. 내부 데이터 무결성을 위해
    // dataset.value(=제목, collectCurrentData에서 사용)는 그대로 lineText로 유지
    const preview = document.createElement('div');
    const previewText = (detailText && detailText.trim()) ? detailText : (lineText || '');
    preview.className = 'memo-preview' + (!lineText ? ' empty' : '');
    preview.dataset.value = lineText || '';

    if (!previewText) {
      const row = document.createElement('div');
      row.className = 'memo-preview-row';
      row.textContent = `메모 ${i+1}`;
      preview.appendChild(row);
    } else {
      const lines = previewText.split('\n');
      const firstLine = lines[0];
      const secondLine = lines.length > 1 ? lines[1] : '';

      const row1 = document.createElement('div');
      row1.className = 'memo-preview-row';
      row1.textContent = firstLine;
      preview.appendChild(row1);

      const row2 = document.createElement('div');
      row2.className = 'memo-preview-row';
      row2.textContent = secondLine;
      preview.appendChild(row2);
    }

    const doneBadge = document.createElement('span');
    doneBadge.className = 'done-badge';
    doneBadge.textContent = '완료';

    const arrow = document.createElement('span');
    arrow.className = 'memo-arrow';
    arrow.textContent = '›';

    // 삭제
    const delBtn = document.createElement('button');
    delBtn.className = 'memo-delete';
    delBtn.title = '삭제';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (lineText && !confirm('이 메모를 삭제하시겠습니까?\n삭제 후에는 "되돌리기"로만 복구할 수 있습니다.')) return;
      const before = snapshotFor(curYear, curMonth, selectedDay);
      const d2 = collectCurrentData();
      d2.lines.splice(i, 1);   d2.lines.push('');
      d2.details.splice(i, 1); d2.details.push('');
      d2.checked.splice(i, 1); d2.checked.push(false);
      d2.persons.splice(i, 1); d2.persons.push('');
      if (!d2.status1) d2.status1 = Array(LINE_COUNT).fill('');
      if (!d2.status2) d2.status2 = Array(LINE_COUNT).fill('');
      d2.status1.splice(i, 1); d2.status1.push('');
      d2.status2.splice(i, 1); d2.status2.push('');
      saveData(curYear, curMonth, selectedDay, d2);
      pushUndo(before);
      renderMemoLines();
    });

    row.addEventListener('click', () => openDetail(i));

    row.appendChild(check);
    row.appendChild(num);
    row.appendChild(statusCol);
    row.appendChild(preview);
    row.appendChild(doneBadge);
    row.appendChild(arrow);
    row.appendChild(delBtn);

    // 드래그 핸들
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '<span></span><span></span><span></span>';
    handle.title = '드래그해서 순서 변경';
    row.insertBefore(handle, row.firstChild);

    return row;
  }

  function renderMemoLines() {
    const data = loadData(curYear, curMonth, selectedDay);
    ensureDailyBackup(storageKey(curYear, curMonth, selectedDay));
    const container = document.getElementById('memoLines');
    container.innerHTML = '';

    if (selectedDay === SPECIAL_TAB) {
      document.getElementById('memoDateLabel').innerHTML = `<span>👤 철수</span>모든 월 공유`;
    } else if (selectedDay === BORU_TAB) {
      document.getElementById('memoDateLabel').innerHTML = `<span>⏸ 보류</span>모든 월 공유`;
    } else {
      const date = new Date(curYear, curMonth, selectedDay);
      document.getElementById('memoDateLabel').innerHTML =
        `<span>${curYear}년 ${curMonth+1}월 ${selectedDay}일</span>${DAYS_KO[date.getDay()]}요일`;
    }

    for (let i = 0; i < LINE_COUNT; i++) {
      container.appendChild(buildMemoRow(i, data.lines[i], data.checked[i] || false, (data.status1||[])[i]||'', (data.status2||[])[i]||'', data.details[i]));
    }

    document.getElementById('saveStatus').textContent = '';
    document.getElementById('monthLabel').textContent = `${curYear}년 ${MONTHS_KO[curMonth]}`;
  }

  function selectDay(d) {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    selectedDay = d;
    renderTabs();
    renderMemoLines();
  }

  // ── 상세 화면 열기/닫기 ──
  let detailEditSnapshot = null; // 상세화면 진입 시점의 "변경 전" 상태 (첫 저장에만 undo로 등록)

  function openDetail(index) {
    detailIndex = index;
    detailEditSnapshot = snapshotFor(curYear, curMonth, selectedDay);
    const data = loadData(curYear, curMonth, selectedDay);
    const title = data.lines[index] || '';
    const content = data.details[index] || '';
    const isDone = data.checked[index] || false;

    // 헤더 타이틀
    if (selectedDay === SPECIAL_TAB) {
      document.getElementById('detailHeaderTitle').textContent = `철수 · ${index+1}번`;
    } else if (selectedDay === BORU_TAB) {
      document.getElementById('detailHeaderTitle').textContent = `보류 · ${index+1}번`;
    } else {
      document.getElementById('detailHeaderTitle').textContent =
        `${curMonth+1}월 ${selectedDay}일 · ${index+1}번`;
    }

    document.getElementById('detailTitleInput').value = title;
    document.getElementById('detailContent').value = content;

    const circle = document.getElementById('detailCheckCircle');
    if (isDone) circle.classList.add('checked');
    else circle.classList.remove('checked');

    document.getElementById('detailSavedMsg').style.opacity = '0';

    // 이동 드롭다운 채우기
    const moveSelect = document.getElementById('detailMoveTarget');
    moveSelect.innerHTML = '<option value="">-- 선택 --</option>';

    // 철수 / 보류 옵션
    if (selectedDay !== SPECIAL_TAB) {
      const opt = document.createElement('option');
      opt.value = '__cheolsu__';
      opt.textContent = '👤 철수';
      moveSelect.appendChild(opt);
    }
    if (selectedDay !== BORU_TAB) {
      const opt = document.createElement('option');
      opt.value = '__boru__';
      opt.textContent = '⏸ 보류';
      moveSelect.appendChild(opt);
    }

    // 날짜 옵션 (해당 메모 기준 이전 10일 ~ 이후 한달)
    const baseDate = (selectedDay === SPECIAL_TAB || selectedDay === BORU_TAB)
      ? new Date()
      : new Date(curYear, curMonth, selectedDay);
    baseDate.setHours(0, 0, 0, 0);

    const rangeStart = new Date(baseDate);
    rangeStart.setDate(rangeStart.getDate() - 10);
    const rangeEnd = new Date(baseDate);
    rangeEnd.setMonth(rangeEnd.getMonth() + 1);

    const DAYS_KO2 = ['일','월','화','수','목','금','토'];
    const cursor = new Date(rangeStart);
    while (cursor <= rangeEnd) {
      const y = cursor.getFullYear(), m = cursor.getMonth(), d = cursor.getDate();
      const isSameAsCurrent = selectedDay !== SPECIAL_TAB && selectedDay !== BORU_TAB &&
        y === curYear && m === curMonth && d === selectedDay;
      if (!isSameAsCurrent) {
        const dow = DAYS_KO2[cursor.getDay()];
        const opt = document.createElement('option');
        opt.value = `__date__${y}__${m}__${d}`;
        opt.textContent = `${y}년 ${m+1}월 ${d}일 (${dow})`;
        moveSelect.appendChild(opt);
      }
      cursor.setDate(cursor.getDate() + 1);
    }

    // 화면 전환
    document.getElementById('mainScreen').classList.add('slide-out');
    document.getElementById('detailScreen').classList.add('slide-in');

    setTimeout(() => {
      document.getElementById('detailTitleInput').focus();
    }, 320);
  }

  function closeDetail() {
    document.getElementById('mainScreen').classList.remove('slide-out');
    document.getElementById('detailScreen').classList.remove('slide-in');

    // 메인 목록 새로 고침 (상세에서 수정된 내용 반영)
    renderMemoLines();
    detailIndex = -1;
    detailEditSnapshot = null;
  }

  function saveDetail() {
    if (detailIndex < 0) return;
    const titleVal = document.getElementById('detailTitleInput').value;
    const contentVal = document.getElementById('detailContent').value;
    const isDone = document.getElementById('detailCheckCircle').classList.contains('checked');

    // 상세 내용의 첫 줄을 제목(미리보기)으로 노출
    const firstLine = contentVal.split('\n')[0].trim();
    const displayTitle = firstLine || titleVal;

    const data = loadData(curYear, curMonth, selectedDay);
    data.lines[detailIndex] = displayTitle;
    data.details[detailIndex] = contentVal;
    data.checked[detailIndex] = isDone;
    saveData(curYear, curMonth, selectedDay, data);

    // 이 상세보기 세션에서 처음 저장하는 것이라면, 진입 시점 상태를 undo 1단계로 등록
    // (타이핑 중 자동저장이 반복돼도 여러 단계로 쌓이지 않도록 한 번만 등록)
    if (detailEditSnapshot) {
      pushUndo(detailEditSnapshot);
      detailEditSnapshot = null;
    }

    // 상세 화면 제목 입력란도 동기화
    document.getElementById('detailTitleInput').value = displayTitle;

    const msg = document.getElementById('detailSavedMsg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 1800);
  }

  // 뒤로가기
  document.getElementById('backBtn').addEventListener('click', () => {
    saveDetail();
    closeDetail();
  });

  // 이동 버튼
  document.getElementById('detailMoveBtn').addEventListener('click', () => {
    if (detailIndex < 0) return;
    const val = document.getElementById('detailMoveTarget').value;
    if (!val) { alert('이동할 대상을 선택하세요.'); return; }

    // 내용 저장 + 이동을 하나의 undo 단계로 묶기 위해
    // 이동 전 원본 상태를 먼저 떠두고, saveDetail이 별도로 undo를 등록하지 않도록 비워둔다
    const srcBefore = snapshotFor(curYear, curMonth, selectedDay);
    detailEditSnapshot = null;

    // 현재 항목 데이터 저장 먼저
    saveDetail();

    // 현재 위치에서 데이터 꺼내기
    const srcData = loadData(curYear, curMonth, selectedDay);
    if (!srcData.status1) srcData.status1 = Array(LINE_COUNT).fill('');
    if (!srcData.status2) srcData.status2 = Array(LINE_COUNT).fill('');
    const moveLine    = srcData.lines[detailIndex];
    const moveDetail  = srcData.details[detailIndex];
    const moveChecked = srcData.checked[detailIndex];
    const movePerson  = srcData.persons[detailIndex];
    const moveStatus1 = srcData.status1[detailIndex];
    const moveStatus2 = srcData.status2[detailIndex];

    // 현재 위치에서 빈 칸으로 교체 (맨 뒤로) - 선택란도 메모란과 함께 당겨지도록 동일하게 처리
    srcData.lines.splice(detailIndex, 1);    srcData.lines.push('');
    srcData.details.splice(detailIndex, 1);  srcData.details.push('');
    srcData.checked.splice(detailIndex, 1);  srcData.checked.push(false);
    srcData.persons.splice(detailIndex, 1);  srcData.persons.push('');
    srcData.status1.splice(detailIndex, 1);  srcData.status1.push('');
    srcData.status2.splice(detailIndex, 1);  srcData.status2.push('');
    saveData(curYear, curMonth, selectedDay, srcData);

    // 대상 결정
    let destY = curYear, destM = curMonth, destD;
    if (val === '__cheolsu__') {
      destD = SPECIAL_TAB;
    } else if (val === '__boru__') {
      destD = BORU_TAB;
    } else {
      const parts = val.split('__').filter(Boolean); // date, Y, M, D
      destY = parseInt(parts[1]); destM = parseInt(parts[2]); destD = parseInt(parts[3]);
    }

    // 대상에 추가 (첫 빈 슬롯에)
    const destBefore = snapshotFor(destY, destM, destD);
    const destData = loadData(destY, destM, destD);
    if (!destData.status1) destData.status1 = Array(LINE_COUNT).fill('');
    if (!destData.status2) destData.status2 = Array(LINE_COUNT).fill('');
    const emptyIdx = destData.lines.findIndex(l => !l);
    const insertIdx = emptyIdx >= 0 ? emptyIdx : destData.lines.length;
    if (emptyIdx >= 0) {
      destData.lines[insertIdx]   = moveLine;
      destData.details[insertIdx] = moveDetail;
      destData.checked[insertIdx] = moveChecked;
      destData.persons[insertIdx] = movePerson;
      destData.status1[insertIdx] = moveStatus1;
      destData.status2[insertIdx] = moveStatus2;
    } else {
      destData.lines.push(moveLine);
      destData.details.push(moveDetail);
      destData.checked.push(moveChecked);
      destData.persons.push(movePerson);
      destData.status1.push(moveStatus1);
      destData.status2.push(moveStatus2);
    }
    saveData(destY, destM, destD, destData);
    pushUndo(srcBefore, destBefore);

    // 이동 완료 메시지
    let destLabel;
    if (destD === SPECIAL_TAB) destLabel = '철수';
    else if (destD === BORU_TAB) destLabel = '보류';
    else destLabel = `${destY}년 ${destM+1}월 ${destD}일`;
    alert(`✓ "${moveLine || '(빈 메모)'}"을(를) [${destLabel}]로 이동했습니다.`);

    // 상세 화면 닫기
    closeDetail();
  });

  // 상세 저장 버튼
  document.getElementById('detailSaveBtn').addEventListener('click', saveDetail);

  // 상세 자동 저장 (입력 중 0.6초 후)
  let autoSaveTimer = null;
  ['detailTitleInput', 'detailContent'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(saveDetail, 600);
    });
  });

  // 상세 체크 토글
  document.getElementById('detailCheckRow').addEventListener('click', () => {
    document.getElementById('detailCheckCircle').classList.toggle('checked');
    saveDetail();
  });

  // 메인 저장 버튼
  document.getElementById('saveBtn').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    const s = document.getElementById('saveStatus');
    s.textContent = '✓ 저장되었습니다';
    s.style.opacity = '1';
    setTimeout(() => { s.style.opacity = '0'; }, 2000);
  });

  // 월 이동
  document.getElementById('prevMonth').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    curMonth--;
    if (curMonth < 0) { curMonth = 11; curYear--; }
    if (selectedDay !== SPECIAL_TAB) {
      const dim = new Date(curYear, curMonth + 1, 0).getDate();
      if (selectedDay > dim) selectedDay = dim;
    }
    renderTabs(); renderMemoLines();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    curMonth++;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (selectedDay !== SPECIAL_TAB && selectedDay !== BORU_TAB) {
      selectedDay = 1;
    }
    renderTabs(); renderMemoLines();
  });

  // 안드로이드 뒤로가기 버튼 지원
  window.addEventListener('popstate', () => {
    if (document.getElementById('detailScreen').classList.contains('slide-in')) {
      saveDetail();
      closeDetail();
    }
  });
  // 상세 열릴 때 history 스택 추가
  const _openDetail = openDetail;

  // 드롭다운 외부 클릭 시 닫기
  document.addEventListener('click', () => {
    document.querySelectorAll('.person-dropdown.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.st-dropdown.open').forEach(d => d.classList.remove('open'));
  });

  // ── 드래그 앤 드롭 (마우스 + 터치) ──
  (function initDnD() {
    let dragSrc = null;       // 드래그 중인 row 요소
    let dragIdx = -1;         // 드래그 시작 인덱스
    let overRow = null;       // 현재 hover 중인 row
    let overPos = null;       // 'top' | 'bottom'
    let ghost = null;         // 시각적 고스트 요소
    let touchOffsetY = 0;

    function getRows() {
      return Array.from(document.querySelectorAll('#memoLines .memo-line'));
    }

    function clearOver() {
      getRows().forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
    }

    function createGhost(row) {
      const g = row.cloneNode(true);
      g.style.cssText = `
        position: fixed; left: 0; top: 0; width: ${row.offsetWidth}px;
        pointer-events: none; z-index: 9999; opacity: 0.85;
        border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        background: #e8f0fb; transform: rotate(1.5deg);
        transition: none;
      `;
      document.body.appendChild(g);
      return g;
    }

    function moveGhost(x, y) {
      if (!ghost) return;
      ghost.style.left = x + 'px';
      ghost.style.top  = y + 'px';
    }

    function getRowAtPoint(clientY) {
      const rows = getRows();
      for (const r of rows) {
        if (r === dragSrc) continue;
        const rect = r.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          const mid = rect.top + rect.height / 2;
          return { row: r, pos: clientY < mid ? 'top' : 'bottom' };
        }
      }
      return null;
    }

    function applyDrop() {
      if (!dragSrc || !overRow) return;
      const before = snapshotFor(curYear, curMonth, selectedDay);
      const data = loadData(curYear, curMonth, selectedDay);

      // 현재 DOM 순서에서 인덱스 계산
      const rows = getRows();
      const srcDomIdx  = rows.indexOf(dragSrc);
      const destDomIdx = rows.indexOf(overRow);
      if (srcDomIdx === -1 || destDomIdx === -1) return;

      // 삽입 위치 결정
      let insertBefore = overPos === 'top' ? destDomIdx : destDomIdx + 1;
      if (insertBefore > srcDomIdx) insertBefore--;

      // 데이터 배열 재정렬 (lines, details, checked, persons)
      function reorder(arr) {
        const a = [...arr];
        const [item] = a.splice(srcDomIdx, 1);
        a.splice(insertBefore, 0, item);
        return a;
      }
      data.lines   = reorder(data.lines);
      data.details = reorder(data.details);
      data.checked = reorder(data.checked);
      data.persons = reorder(data.persons);
      data.status1 = reorder(data.status1 || Array(LINE_COUNT).fill(''));
      data.status2 = reorder(data.status2 || Array(LINE_COUNT).fill(''));

      saveData(curYear, curMonth, selectedDay, data);
      pushUndo(before);
      renderMemoLines();
    }

    function endDrag(apply) {
      if (ghost) { ghost.remove(); ghost = null; }
      clearOver();
      if (apply && dragSrc && overRow) applyDrop();
      if (dragSrc) dragSrc.classList.remove('dragging');
      dragSrc = null; dragIdx = -1; overRow = null; overPos = null;
    }

    // ── 마우스 이벤트 ──
    document.getElementById('memoLines').addEventListener('mousedown', e => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      e.preventDefault();
      dragSrc = handle.closest('.memo-line');
      dragIdx = parseInt(dragSrc.dataset.index);
      dragSrc.classList.add('dragging');
      const rect = dragSrc.getBoundingClientRect();
      ghost = createGhost(dragSrc);
      moveGhost(rect.left, rect.top);
    });

    document.addEventListener('mousemove', e => {
      if (!dragSrc) return;
      moveGhost(e.clientX - dragSrc.offsetWidth / 2, e.clientY - 20);
      const hit = getRowAtPoint(e.clientY);
      clearOver();
      if (hit) {
        overRow = hit.row; overPos = hit.pos;
        overRow.classList.add(overPos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
      } else {
        overRow = null; overPos = null;
      }
    });

    document.addEventListener('mouseup', () => {
      if (!dragSrc) return;
      endDrag(true);
    });

    // ── 터치 이벤트 ──
    document.getElementById('memoLines').addEventListener('touchstart', e => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      const touch = e.touches[0];
      dragSrc = handle.closest('.memo-line');
      dragIdx = parseInt(dragSrc.dataset.index);
      dragSrc.classList.add('dragging');
      const rect = dragSrc.getBoundingClientRect();
      touchOffsetY = touch.clientY - rect.top;
      ghost = createGhost(dragSrc);
      moveGhost(rect.left, rect.top);
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!dragSrc) return;
      e.preventDefault();
      const touch = e.touches[0];
      moveGhost(0, touch.clientY - touchOffsetY);
      ghost.style.width = '100%';
      const hit = getRowAtPoint(touch.clientY);
      clearOver();
      if (hit) {
        overRow = hit.row; overPos = hit.pos;
        overRow.classList.add(overPos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
      } else {
        overRow = null; overPos = null;
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!dragSrc) return;
      endDrag(true);
    });
  })();

  // 되돌리기 버튼
  document.getElementById('undoBtnMain').addEventListener('click', performUndo);
  document.getElementById('backupBtnMain').addEventListener('click', performBackupRestore);
  document.getElementById('undoBtnDetail').addEventListener('click', performUndo);

  // 초기화
  renderTabs();
  renderMemoLines();
  updateUndoButton();

  // PWA SW
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // PWA 설치 배너
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
  document.getElementById('installClose').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
  });
</script>
</body>
</html>
