<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스케줄 정리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2233">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스케줄">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #1a2233;
    overflow-x: hidden;
  }

  /* ── 화면 전환 래퍼 ── */
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #f0f4f8;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    will-change: transform;
    overflow-y: auto;
  }
  #mainScreen { transform: translateX(0); z-index: 1; }
  #mainScreen.slide-out { transform: translateX(-30%); opacity: 0.5; pointer-events: none; }
  #detailScreen { transform: translateX(100%); z-index: 2; }
  #detailScreen.slide-in { transform: translateX(0); }

  /* ── 공통 헤더 ── */
  .app-header {
    background: #1a2233;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .month-nav-bar {
    background: #151c2a;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .app-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .month-nav button {
    background: none;
    border: 1px solid #3a4a60;
    color: #a0b0c8;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .month-nav button:hover { background: #2a3a50; color: #fff; }
  .month-label {
    font-size: 15px;
    font-weight: 500;
    color: #c8d8ec;
    min-width: 80px;
    text-align: center;
  }

  /* ── 탭 ── */
  .tabs-wrapper {
    background: #1a2233;
    border-bottom: 2px solid #2e4060;
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
  }
  /* 철수 탭 고정 영역 */
  .tabs-fixed {
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    border-right: 2px solid #2e4060;
    background: #1a2233;
    z-index: 2;
  }
  /* 날짜 탭 스크롤 영역 */
  .tabs-scroll {
    flex: 1;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: #3a5070 transparent;
  }
  .tabs-scroll::-webkit-scrollbar { height: 4px; }
  .tabs-scroll::-webkit-scrollbar-thumb { background: #3a5070; border-radius: 2px; }
  .tabs-inner {
    display: flex;
    padding: 0 8px;
    gap: 2px;
    min-width: max-content;
    height: 100%;
  }
  .special-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 14px 7px;
    min-width: 56px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background 0.15s;
    border-bottom: 3px solid transparent;
  }
  .special-tab:hover { background: #253348; }
  .special-tab.active { background: #f0f4f8; border-bottom-color: #e8a040; }
  .special-tab.boru-tab.active { border-bottom-color: #b0b8c8; }
  .special-tab.boru-tab .tab-label { color: #b0b8c8; }
  .special-tab.boru-tab.active .tab-label { color: #607080; }
  .special-tab .tab-icon { font-size: 14px; line-height: 1; }
  .special-tab .tab-label { font-size: 11px; font-weight: 700; color: #e8c080; margin-top: 2px; letter-spacing: 0.5px; }
  .special-tab.active .tab-label { color: #b07010; }
  .day-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 10px 7px;
    min-width: 48px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background 0.15s;
    border-bottom: 3px solid transparent;
    position: relative;
  }
  .day-tab:hover { background: #253348; }
  .day-tab.active { background: #f0f4f8; border-bottom-color: #4a8fe8; }
  .day-tab .day-num { font-size: 15px; font-weight: 700; color: #c8d8ec; line-height: 1; }
  .day-tab .day-name { font-size: 10px; color: #6a80a0; margin-top: 2px; }
  .day-tab.active .day-num { color: #1a2233; }
  .day-tab.active .day-name { color: #4a8fe8; }
  .day-tab.sun .day-num { color: #e86060; }
  .day-tab.sat .day-num { color: #4a8fe8; }
  .day-tab.sun.active .day-num { color: #c04040; }
  .day-tab.sat.active .day-num { color: #2a6ec8; }
  .day-tab.today-tab::after {
    content: '';
    position: absolute;
    top: 5px; right: 5px;
    width: 5px; height: 5px;
    background: #f0a030;
    border-radius: 50%;
  }

  /* ── 메인 메모 목록 ── */
  .memo-area {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    width: 100%;
  }
  .memo-date-label {
    font-size: 13px;
    font-weight: 500;
    color: #6a80a0;
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .memo-date-label span {
    font-size: 22px;
    font-weight: 700;
    color: #1a2233;
    margin-right: 6px;
  }
  .memo-lines { display: flex; flex-direction: column; gap: 10px; }

  .memo-line {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border-radius: 8px;
    padding: 0 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    transition: box-shadow 0.15s, background 0.2s;
    cursor: pointer;
  }
  .memo-line:hover { box-shadow: 0 2px 10px rgba(74,143,232,0.13); }
  .memo-line.done { background: #f4faf4; }

  .memo-check { display: none !important; }

  .memo-line-num { display: none; }

  /* 목록에서 한 줄 미리보기 */
  .memo-preview {
    flex: 1;
    font-size: 14px;
    color: #1a2233;
    padding: 13px 0;
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
    user-select: none;
  }
  .memo-preview.empty { color: #c8d0dc; font-style: italic; }
  .memo-line.done .memo-preview {
    color: #80a080;
    text-decoration: line-through;
    text-decoration-color: #40b860;
  }

  .done-badge { display: none !important; }

  /* 상세보기 화살표 아이콘 */
  .memo-arrow {
    color: #c8d8ec;
    font-size: 16px;
    flex-shrink: 0;
    user-select: none;
  }

  .memo-delete {
    width: 26px; height: 26px; min-width: 26px;
    border-radius: 6px; border: none;
    background: transparent; color: #d0d8e4;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0; line-height: 1; padding: 0;
  }
  .memo-delete:hover { background: #fee2e2; color: #e84040; }

  /* ── 담당자 선택 버튼 ── */
  .person-selector {
    position: relative;
    flex-shrink: 0;
  }
  .person-badge {
    width: 36px; height: 26px;
    border-radius: 6px;
    border: none;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.3px;
    transition: opacity 0.15s, transform 0.1s;
    user-select: none;
    background: #e8edf4;
    color: #8090a8;
    white-space: nowrap;
  }
  .person-badge:hover { opacity: 0.85; transform: scale(1.05); }
  .person-badge.selected { color: #fff; }

  /* 12가지 담당자 색상 */
  .person-badge[data-person="7톤"] { background: #e8c000; color: #5a3e00; }
  .person-badge[data-person="4톤"] { background: #8a4ae0; color: #fff; }
  .person-badge[data-person="성민"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="태진"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="규형"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="성호"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="서진"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="홍식"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="동혁"] { background: #2b7ee8; color: #fff; }
  .person-badge[data-person="화물"] { background: #607080; color: #fff; }
  .person-badge[data-person="준비됨"] { background: #39ff14; color: #1a4000; }
  .person-badge[data-person="보류"] { background: #b0b8c8; color: #fff; }

  /* 선택 안 된 상태 (빈 뱃지) */
  .person-badge.none {
    background: #e8edf4;
    color: #8090a8;
    border: 1.5px dashed #c8d0dc;
  }

  /* 드롭다운 팝업 */
  .person-dropdown {
    display: none;
    position: absolute;
    top: 30px; left: 0;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    padding: 8px;
    z-index: 100;
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    min-width: 140px;
  }
  .person-dropdown.open { display: grid; }
  .person-drop-item {
    padding: 5px 6px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    color: #fff;
    transition: opacity 0.15s, transform 0.1s;
    user-select: none;
  }
  .person-drop-item:hover { opacity: 0.85; transform: scale(1.05); }
  .person-drop-item.clear {
    background: #e8edf4;
    color: #8090a8;
    border: 1.5px dashed #c8d0dc;
    grid-column: 1 / -1;
    font-size: 10px;
  }
  .person-drop-item[data-person="7톤"] { background: #e8c000; color: #5a3e00; }
  .person-drop-item[data-person="4톤"] { background: #8a4ae0; }
  .person-drop-item[data-person="성민"] { background: #2b7ee8; }
  .person-drop-item[data-person="태진"] { background: #2b7ee8; }
  .person-drop-item[data-person="규형"] { background: #2b7ee8; }
  .person-drop-item[data-person="성호"] { background: #2b7ee8; }
  .person-drop-item[data-person="서진"] { background: #2b7ee8; }
  .person-drop-item[data-person="홍식"] { background: #2b7ee8; }
  .person-drop-item[data-person="동혁"] { background: #2b7ee8; }
  .person-drop-item[data-person="화물"] { background: #607080; }
  .person-drop-item[data-person="준비됨"] { background: #39ff14; color: #1a4000; }
  .person-drop-item[data-person="보류"] { background: #b0b8c8; }

  /* ── 드래그 앤 드롭 ── */
  .drag-handle {
    width: 20px; min-width: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: grab;
    padding: 8px 2px;
    opacity: 0.3;
    transition: opacity 0.15s;
    flex-shrink: 0;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .memo-line:hover .drag-handle { opacity: 0.6; }
  .drag-handle span {
    display: block;
    width: 14px; height: 2px;
    background: #607080;
    border-radius: 2px;
  }

  .memo-line.dragging {
    opacity: 0.4;
    background: #e8f0fb !important;
  }
  .memo-line.drag-over-top {
    border-top: 2px solid #4a8fe8;
  }
  .memo-line.drag-over-bottom {
    border-bottom: 2px solid #4a8fe8;
  }
  .save-btn button {
    background: #1a2233; color: #fff; border: none;
    border-radius: 6px; padding: 10px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    letter-spacing: 0.3px; transition: background 0.15s;
  }
  .save-btn button:hover { background: #2a3a50; }
  .save-status {
    font-size: 12px; color: #4a8fe8;
    margin-top: 8px; text-align: right;
    height: 16px; transition: opacity 0.3s;
  }

  /* ── 상세 화면 ── */
  #detailScreen { background: #f0f4f8; }

  .detail-header {
    background: #1a2233;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: #4a8fe8;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .back-btn:hover { background: #253348; }
  .back-btn .back-arrow { font-size: 18px; }
  .detail-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: #c8d8ec;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .detail-save-btn {
    background: #4a8fe8;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .detail-save-btn:hover { background: #2a6ec8; }

  .detail-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 40px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* 상세 제목 한 줄 입력 */
  .detail-title-input {
    width: 100%;
    border: none;
    border-bottom: 2px solid #d0dce8;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #1a2233;
    padding: 8px 0 10px;
    background: transparent;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    line-height: 1.3;
  }
  .detail-title-input:focus { border-bottom-color: #4a8fe8; }
  .detail-title-input::placeholder { color: #c8d0dc; font-weight: 400; }

  /* 상세 내용 여러 줄 textarea */
  .detail-content {
    flex: 1;
    width: 100%;
    min-height: 300px;
    border: none;
    border-radius: 10px;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: #1a2233;
    padding: 16px;
    background: #fff;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    resize: vertical;
    line-height: 1.8;
    transition: box-shadow 0.2s;
  }
  .detail-content:focus { box-shadow: 0 0 0 2px #4a8fe8, 0 2px 12px rgba(74,143,232,0.12); }
  .detail-content::placeholder { color: #c8d0dc; }

  .detail-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    font-size: 12px;
    color: #90a0b8;
  }
  .detail-check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .detail-check-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid #c8d8ec;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .detail-check-circle.checked { border-color: #40b860; background: #40b860; }
  .detail-check-circle.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
  .detail-check-label { font-size: 13px; color: #6a80a0; }

  .detail-saved-msg {
    font-size: 12px;
    color: #40b860;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* ── 상세 이동 섹션 ── */
  .detail-move-section {
    margin-top: 18px;
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .detail-move-title {
    font-size: 12px;
    font-weight: 700;
    color: #6a80a0;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .detail-move-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .detail-move-label {
    font-size: 12px;
    color: #8090a8;
    flex-shrink: 0;
  }
  .detail-move-select {
    flex: 1;
    min-width: 100px;
    padding: 6px 10px;
    border: 1.5px solid #d0dce8;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    color: #1a2233;
    background: #f8fafb;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    appearance: auto;
  }
  .detail-move-select:focus { border-color: #4a8fe8; }
  .detail-move-btn {
    background: #4a8fe8;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .detail-move-btn:hover { background: #2a6ec8; }

  /* ── PWA 설치 배너 ── */
  #installBanner {
    display: none;
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: #1a2233;
    color: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    padding: 14px 18px;
    align-items: center;
    gap: 12px;
    z-index: 9999;
    max-width: 360px;
    width: calc(100% - 40px);
    border: 1px solid #3a5070;
  }
  #installBanner .banner-icon { font-size: 24px; }
  #installBanner .banner-text { flex: 1; }
  #installBanner .banner-title { font-size: 13px; font-weight: 700; color: #fff; }
  #installBanner .banner-sub { font-size: 11px; color: #8090a8; margin-top: 2px; }
  #installBtn {
    background: #4a8fe8; color: #fff; border: none;
    border-radius: 8px; padding: 8px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  #installBtn:hover { background: #2a6ec8; }
  #installClose {
    background: none; border: none; color: #6a80a0;
    font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1;
  }
  #installClose:hover { color: #fff; }
</style>
</head>
<body>

<!-- ── 설치 배너 ── -->
<div id="installBanner">
  <span class="banner-icon">📋</span>
  <div class="banner-text">
    <div class="banner-title">앱으로 설치하기</div>
    <div class="banner-sub">홈 화면에 추가하면 앱처럼 사용 가능</div>
  </div>
  <button id="installBtn">설치</button>
  <button id="installClose">✕</button>
</div>

<!-- ══ 메인 화면 ══ -->
<div class="screen" id="mainScreen">
  <div class="app-header">
    <div class="app-title">📋 한국종합리프트</div>
  </div>
  <div class="month-nav-bar">
    <div class="month-nav">
      <button id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="nextMonth">›</button>
    </div>
  </div>

  <div class="tabs-wrapper">
    <div class="tabs-fixed" id="tabsFixed"></div>
    <div class="tabs-scroll">
      <div class="tabs-inner" id="tabsInner"></div>
    </div>
  </div>

  <div style="flex:1; overflow-y:auto;">
    <div class="memo-area">
      <div class="memo-date-label" id="memoDateLabel"></div>
      <div class="memo-lines" id="memoLines"></div>
      <div class="save-btn">
        <button id="saveBtn">저장</button>
      </div>
      <div class="save-status" id="saveStatus"></div>
    </div>
  </div>
</div>

<!-- ══ 상세 화면 ══ -->
<div class="screen" id="detailScreen">
  <div class="detail-header">
    <button class="back-btn" id="backBtn">
      <span class="back-arrow">‹</span> 뒤로
    </button>
    <div class="detail-title" id="detailHeaderTitle">메모 상세</div>
    <button class="detail-save-btn" id="detailSaveBtn">저장</button>
  </div>

  <div style="flex:1; overflow-y:auto;">
    <div class="detail-body">
      <input class="detail-title-input" id="detailTitleInput" type="text" placeholder="제목을 입력하세요" maxlength="100">
      <textarea class="detail-content" id="detailContent" placeholder="내용을 자유롭게 입력하세요&#10;&#10;메모, 할 일, 아이디어 등 무엇이든 적어보세요."></textarea>
      <div class="detail-meta">
        <div class="detail-check-row" id="detailCheckRow">
          <div class="detail-check-circle" id="detailCheckCircle"></div>
          <span class="detail-check-label">완료 표시</span>
        </div>
        <div class="detail-saved-msg" id="detailSavedMsg">✓ 저장됨</div>
      </div>
      <!-- 날짜/탭 이동 섹션 -->
      <div class="detail-move-section">
        <div class="detail-move-title">📤 다른 날짜 / 탭으로 이동</div>
        <div class="detail-move-row">
          <span class="detail-move-label">이동:</span>
          <select class="detail-move-select" id="detailMoveTarget">
            <option value="">-- 선택 --</option>
          </select>
          <button class="detail-move-btn" id="detailMoveBtn">이동</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC0oKhiIYVqE3-KUYavxApuH5wCuX4WZW4",
    authDomain: "scheduler-1203c.firebaseapp.com",
    databaseURL: "https://scheduler-1203c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "scheduler-1203c",
    storageBucket: "scheduler-1203c.firebasestorage.app",
    messagingSenderId: "107615593812",
    appId: "1:107615593812:web:3a8472f6f5a6e8d52f94c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Firebase로 saveData/loadData 교체
  window._fbSave = function(key, data) {
    set(ref(db, 'schedules/' + key), data).catch(e => console.error('저장 오류', e));
    // 로컬에도 캐시
    try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
  };

  window._fbLoad = function(key) {
    // 일단 로컬 캐시 반환 (빠른 렌더용)
    try {
      const raw = localStorage.getItem(key);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  };

  // Firebase에서 현재 날짜 데이터 실시간 수신
  let currentKey = null;
  window._fbWatch = function(key, callback) {
    if (currentKey === key) return;
    currentKey = key;
    onValue(ref(db, 'schedules/' + key), snap => {
      const data = snap.val();
      if (data) {
        try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
        callback(data);
      }
    });
  };

  const DAYS_KO = ['일','월','화','수','목','금','토'];
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const LINE_COUNT = 20;
  const SPECIAL_TAB = 'cheolsu';
  const CHEOLSU_KEY = 'sched_cheolsu_global';
  const BORU_TAB = 'boru';
  const BORU_KEY = 'sched_boru_global';

  const now = new Date();
  let curYear = now.getFullYear();
  let curMonth = now.getMonth();
  let selectedDay = now.getDate();
  let detailIndex = -1; // 현재 열린 상세 인덱스

  // ── 스토리지 ──
  const storageKey = (y, m, d) => d === SPECIAL_TAB ? CHEOLSU_KEY : d === BORU_TAB ? BORU_KEY : `sched_${y}_${m+1}_${d}`;

  const PERSONS = ['7톤','4톤','성민','태진','규형','성호','서진','홍식','동혁','화물','준비됨','보류'];

  function emptyData() {
    return {
      lines: Array(LINE_COUNT).fill(''),
      details: Array(LINE_COUNT).fill(''),
      checked: Array(LINE_COUNT).fill(false),
      persons: Array(LINE_COUNT).fill('')
    };
  }

  function saveData(y, m, d, data) {
    const key = storageKey(y, m, d);
    if (window._fbSave) {
      window._fbSave(key, data);
    } else {
      try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
    }
  }

  function loadData(y, m, d) {
    const key = storageKey(y, m, d);
    // Firebase 실시간 감지 등록
    if (window._fbWatch) {
      window._fbWatch(key, (data) => {
        // 다른 기기에서 변경 시 자동 갱신
        const normalized = normalizeData(data);
        try { localStorage.setItem(key, JSON.stringify(normalized)); } catch(e) {}
        if (storageKey(curYear, curMonth, selectedDay) === key) {
          renderMemoLines();
        }
      });
    }
    try {
      const raw = (window._fbLoad ? window._fbLoad(key) : null)
                  || JSON.parse(localStorage.getItem(key));
      if (!raw) return emptyData();
      return normalizeData(raw);
    } catch { return emptyData(); }
  }

  function normalizeData(p) {
    if (!p) return emptyData();
    if (Array.isArray(p)) {
      return { lines: p.concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT), details: Array(LINE_COUNT).fill(''), checked: Array(LINE_COUNT).fill(false), persons: Array(LINE_COUNT).fill('') };
    }
    return {
      lines:   (p.lines   || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      details: (p.details || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT),
      checked: (p.checked || []).concat(Array(LINE_COUNT).fill(false)).slice(0, LINE_COUNT),
      persons: (p.persons || []).concat(Array(LINE_COUNT).fill('')).slice(0, LINE_COUNT)
    };
  }

  function collectCurrentData() {
    const rows = document.querySelectorAll('.memo-line');
    const data = loadData(curYear, curMonth, selectedDay);
    rows.forEach(row => {
      const i = parseInt(row.dataset.index);
      const preview = row.querySelector('.memo-preview');
      const check = row.querySelector('.memo-check');
      const badge = row.querySelector('.person-badge');
      if (preview) data.lines[i] = preview.dataset.value || '';
      if (check) data.checked[i] = check.classList.contains('checked');
      if (badge) data.persons[i] = badge.dataset.current || '';
    });
    return data;
  }

  // ── 탭 렌더 ──
  function renderTabs() {
    const fixed = document.getElementById('tabsFixed');
    const inner = document.getElementById('tabsInner');
    fixed.innerHTML = '';
    inner.innerHTML = '';

    const st = document.createElement('div');
    st.className = 'special-tab' + (selectedDay === SPECIAL_TAB ? ' active' : '');
    st.innerHTML = `<span class="tab-icon">👤</span><span class="tab-label">철수</span>`;
    st.addEventListener('click', () => selectDay(SPECIAL_TAB));
    fixed.appendChild(st);

    const bt = document.createElement('div');
    bt.className = 'special-tab boru-tab' + (selectedDay === BORU_TAB ? ' active' : '');
    bt.innerHTML = `<span class="tab-icon">⏸</span><span class="tab-label">보류</span>`;
    bt.addEventListener('click', () => selectDay(BORU_TAB));
    fixed.appendChild(bt);

    const dim = new Date(curYear, curMonth + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      const date = new Date(curYear, curMonth, d);
      const dow = date.getDay();
      const tab = document.createElement('div');
      tab.className = 'day-tab';
      if (dow === 0) tab.classList.add('sun');
      if (dow === 6) tab.classList.add('sat');
      if (curYear === now.getFullYear() && curMonth === now.getMonth() && d === now.getDate()) tab.classList.add('today-tab');
      if (d === selectedDay) tab.classList.add('active');
      tab.innerHTML = `<span class="day-num">${d}</span><span class="day-name">${DAYS_KO[dow]}</span>`;
      tab.addEventListener('click', () => selectDay(d));
      inner.appendChild(tab);
    }

    setTimeout(() => {
      const a = document.querySelector('.tabs-inner .day-tab.active');
      if (a) a.scrollIntoView({ inline: 'center', block: 'nearest' });
    }, 50);
  }

  // ── 메인 목록 렌더 ──
  function buildMemoRow(i, lineText, isDone, personVal) {
    const row = document.createElement('div');
    row.className = 'memo-line' + (isDone ? ' done' : '');
    row.dataset.index = i;

    // 체크
    const check = document.createElement('div');
    check.className = 'memo-check' + (isDone ? ' checked' : '');
    check.addEventListener('click', e => {
      e.stopPropagation();
      check.classList.toggle('checked');
      row.classList.toggle('done', check.classList.contains('checked'));
      const d = collectCurrentData();
      saveData(curYear, curMonth, selectedDay, d);
    });

    // 번호
    const num = document.createElement('span');
    num.className = 'memo-line-num';
    num.textContent = i + 1;

    // ── 담당자 선택 ──
    const personSel = document.createElement('div');
    personSel.className = 'person-selector';

    const badge = document.createElement('button');
    badge.className = 'person-badge' + (personVal ? ' selected' : ' none');
    badge.dataset.person = personVal || '';
    badge.dataset.current = personVal || '';
    badge.textContent = personVal || '··';
    if (personVal) badge.setAttribute('data-person', personVal);

    const dropdown = document.createElement('div');
    dropdown.className = 'person-dropdown';

    // 초기화 항목
    const clearItem = document.createElement('div');
    clearItem.className = 'person-drop-item clear';
    clearItem.textContent = '선택 안 함';
    clearItem.addEventListener('click', e => {
      e.stopPropagation();
      badge.textContent = '··';
      badge.dataset.person = '';
      badge.dataset.current = '';
      badge.className = 'person-badge none';
      badge.removeAttribute('data-person');
      dropdown.classList.remove('open');
      const d = collectCurrentData();
      saveData(curYear, curMonth, selectedDay, d);
    });
    dropdown.appendChild(clearItem);

    PERSONS.forEach(name => {
      const item = document.createElement('div');
      item.className = 'person-drop-item';
      item.dataset.person = name;
      item.textContent = name;
      item.addEventListener('click', e => {
        e.stopPropagation();
        badge.textContent = name;
        badge.dataset.person = name;
        badge.dataset.current = name;
        badge.className = 'person-badge selected';
        badge.setAttribute('data-person', name);
        dropdown.classList.remove('open');
        const d = collectCurrentData();
        saveData(curYear, curMonth, selectedDay, d);
      });
      dropdown.appendChild(item);
    });

    badge.addEventListener('click', e => {
      e.stopPropagation();
      // 다른 드롭다운 모두 닫기
      document.querySelectorAll('.person-dropdown.open').forEach(d => {
        if (d !== dropdown) d.classList.remove('open');
      });
      dropdown.classList.toggle('open');
    });

    personSel.appendChild(badge);
    personSel.appendChild(dropdown);

    // 미리보기 텍스트
    const preview = document.createElement('div');
    preview.className = 'memo-preview' + (!lineText ? ' empty' : '');
    preview.textContent = lineText || `메모 ${i+1}`;
    preview.dataset.value = lineText || '';

    // 완료 뱃지
    const doneBadge = document.createElement('span');
    doneBadge.className = 'done-badge';
    doneBadge.textContent = '완료';

    // 화살표
    const arrow = document.createElement('span');
    arrow.className = 'memo-arrow';
    arrow.textContent = '›';

    // 삭제
    const delBtn = document.createElement('button');
    delBtn.className = 'memo-delete';
    delBtn.title = '삭제';
    delBtn.textContent = '×';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      // 현재 데이터 수집
      const d2 = collectCurrentData();
      // 해당 인덱스 항목을 빈 값으로 초기화 후 맨 아래로 이동
      const emptyEntry = { line: '', detail: '', checked: false, person: '' };
      // 삭제 대상 제거
      d2.lines.splice(i, 1);   d2.lines.push('');
      d2.details.splice(i, 1); d2.details.push('');
      d2.checked.splice(i, 1); d2.checked.push(false);
      d2.persons.splice(i, 1); d2.persons.push('');
      saveData(curYear, curMonth, selectedDay, d2);
      renderMemoLines();
    });

    // 클릭 → 상세 화면
    row.addEventListener('click', () => openDetail(i));

    row.appendChild(check);
    row.appendChild(num);
    row.appendChild(personSel);
    row.appendChild(preview);
    row.appendChild(doneBadge);
    row.appendChild(arrow);
    row.appendChild(delBtn);

    // 드래그 핸들 (맨 왼쪽)
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '<span></span><span></span><span></span>';
    handle.title = '드래그해서 순서 변경';
    row.insertBefore(handle, row.firstChild);

    return row;
  }

  function renderMemoLines() {
    const data = loadData(curYear, curMonth, selectedDay);
    const container = document.getElementById('memoLines');
    container.innerHTML = '';

    if (selectedDay === SPECIAL_TAB) {
      document.getElementById('memoDateLabel').innerHTML = `<span>👤 철수</span>모든 월 공유`;
    } else if (selectedDay === BORU_TAB) {
      document.getElementById('memoDateLabel').innerHTML = `<span>⏸ 보류</span>모든 월 공유`;
    } else {
      const date = new Date(curYear, curMonth, selectedDay);
      document.getElementById('memoDateLabel').innerHTML =
        `<span>${curYear}년 ${curMonth+1}월 ${selectedDay}일</span>${DAYS_KO[date.getDay()]}요일`;
    }

    for (let i = 0; i < LINE_COUNT; i++) {
      container.appendChild(buildMemoRow(i, data.lines[i], data.checked[i] || false, data.persons[i] || ''));
    }

    document.getElementById('saveStatus').textContent = '';
    document.getElementById('monthLabel').textContent = `${curYear}년 ${MONTHS_KO[curMonth]}`;
  }

  function selectDay(d) {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    selectedDay = d;
    renderTabs();
    renderMemoLines();
  }

  // ── 상세 화면 열기/닫기 ──
  function openDetail(index) {
    detailIndex = index;
    const data = loadData(curYear, curMonth, selectedDay);
    const title = data.lines[index] || '';
    const content = data.details[index] || '';
    const isDone = data.checked[index] || false;

    // 헤더 타이틀
    if (selectedDay === SPECIAL_TAB) {
      document.getElementById('detailHeaderTitle').textContent = `철수 · ${index+1}번`;
    } else if (selectedDay === BORU_TAB) {
      document.getElementById('detailHeaderTitle').textContent = `보류 · ${index+1}번`;
    } else {
      document.getElementById('detailHeaderTitle').textContent =
        `${curMonth+1}월 ${selectedDay}일 · ${index+1}번`;
    }

    document.getElementById('detailTitleInput').value = title;
    document.getElementById('detailContent').value = content;

    const circle = document.getElementById('detailCheckCircle');
    if (isDone) circle.classList.add('checked');
    else circle.classList.remove('checked');

    document.getElementById('detailSavedMsg').style.opacity = '0';

    // 이동 드롭다운 채우기
    const moveSelect = document.getElementById('detailMoveTarget');
    moveSelect.innerHTML = '<option value="">-- 선택 --</option>';

    // 철수 / 보류 옵션
    if (selectedDay !== SPECIAL_TAB) {
      const opt = document.createElement('option');
      opt.value = '__cheolsu__';
      opt.textContent = '👤 철수';
      moveSelect.appendChild(opt);
    }
    if (selectedDay !== BORU_TAB) {
      const opt = document.createElement('option');
      opt.value = '__boru__';
      opt.textContent = '⏸ 보류';
      moveSelect.appendChild(opt);
    }

    // 이번 달 날짜 옵션
    const dim = new Date(curYear, curMonth + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      if (d === selectedDay) continue;
      const date = new Date(curYear, curMonth, d);
      const DAYS_KO2 = ['일','월','화','수','목','금','토'];
      const dow = DAYS_KO2[date.getDay()];
      const opt = document.createElement('option');
      opt.value = `__date__${curYear}__${curMonth}__${d}`;
      opt.textContent = `${curYear}년 ${curMonth+1}월 ${d}일 (${dow})`;
      moveSelect.appendChild(opt);
    }

    // 화면 전환
    document.getElementById('mainScreen').classList.add('slide-out');
    document.getElementById('detailScreen').classList.add('slide-in');

    setTimeout(() => {
      document.getElementById('detailTitleInput').focus();
    }, 320);
  }

  function closeDetail() {
    document.getElementById('mainScreen').classList.remove('slide-out');
    document.getElementById('detailScreen').classList.remove('slide-in');

    // 메인 목록 새로 고침 (상세에서 수정된 내용 반영)
    renderMemoLines();
    detailIndex = -1;
  }

  function saveDetail() {
    if (detailIndex < 0) return;
    const titleVal = document.getElementById('detailTitleInput').value;
    const contentVal = document.getElementById('detailContent').value;
    const isDone = document.getElementById('detailCheckCircle').classList.contains('checked');

    // 상세 내용의 첫 줄을 제목(미리보기)으로 노출
    const firstLine = contentVal.split('\n')[0].trim();
    const displayTitle = firstLine || titleVal;

    const data = loadData(curYear, curMonth, selectedDay);
    data.lines[detailIndex] = displayTitle;
    data.details[detailIndex] = contentVal;
    data.checked[detailIndex] = isDone;
    saveData(curYear, curMonth, selectedDay, data);

    // 상세 화면 제목 입력란도 동기화
    document.getElementById('detailTitleInput').value = displayTitle;

    const msg = document.getElementById('detailSavedMsg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 1800);
  }

  // 뒤로가기
  document.getElementById('backBtn').addEventListener('click', () => {
    saveDetail();
    closeDetail();
  });

  // 이동 버튼
  document.getElementById('detailMoveBtn').addEventListener('click', () => {
    if (detailIndex < 0) return;
    const val = document.getElementById('detailMoveTarget').value;
    if (!val) { alert('이동할 대상을 선택하세요.'); return; }

    // 현재 항목 데이터 저장 먼저
    saveDetail();

    // 현재 위치에서 데이터 꺼내기
    const srcData = loadData(curYear, curMonth, selectedDay);
    const moveLine    = srcData.lines[detailIndex];
    const moveDetail  = srcData.details[detailIndex];
    const moveChecked = srcData.checked[detailIndex];
    const movePerson  = srcData.persons[detailIndex];

    // 현재 위치에서 빈 칸으로 교체 (맨 뒤로)
    srcData.lines.splice(detailIndex, 1);    srcData.lines.push('');
    srcData.details.splice(detailIndex, 1);  srcData.details.push('');
    srcData.checked.splice(detailIndex, 1);  srcData.checked.push(false);
    srcData.persons.splice(detailIndex, 1);  srcData.persons.push('');
    saveData(curYear, curMonth, selectedDay, srcData);

    // 대상 결정
    let destY = curYear, destM = curMonth, destD;
    if (val === '__cheolsu__') {
      destD = SPECIAL_TAB;
    } else if (val === '__boru__') {
      destD = BORU_TAB;
    } else {
      const parts = val.split('__').filter(Boolean); // date, Y, M, D
      destY = parseInt(parts[1]); destM = parseInt(parts[2]); destD = parseInt(parts[3]);
    }

    // 대상에 추가 (첫 빈 슬롯에)
    const destData = loadData(destY, destM, destD);
    const emptyIdx = destData.lines.findIndex(l => !l);
    const insertIdx = emptyIdx >= 0 ? emptyIdx : destData.lines.length;
    if (emptyIdx >= 0) {
      destData.lines[insertIdx]   = moveLine;
      destData.details[insertIdx] = moveDetail;
      destData.checked[insertIdx] = moveChecked;
      destData.persons[insertIdx] = movePerson;
    } else {
      destData.lines.push(moveLine);
      destData.details.push(moveDetail);
      destData.checked.push(moveChecked);
      destData.persons.push(movePerson);
    }
    saveData(destY, destM, destD, destData);

    // 이동 완료 메시지
    let destLabel;
    if (destD === SPECIAL_TAB) destLabel = '철수';
    else if (destD === BORU_TAB) destLabel = '보류';
    else destLabel = `${destY}년 ${destM+1}월 ${destD}일`;
    alert(`✓ "${moveLine || '(빈 메모)'}"을(를) [${destLabel}]로 이동했습니다.`);

    // 상세 화면 닫기
    closeDetail();
  });

  // 상세 저장 버튼
  document.getElementById('detailSaveBtn').addEventListener('click', saveDetail);

  // 상세 자동 저장 (입력 중 0.6초 후)
  let autoSaveTimer = null;
  ['detailTitleInput', 'detailContent'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(saveDetail, 600);
    });
  });

  // 상세 체크 토글
  document.getElementById('detailCheckRow').addEventListener('click', () => {
    document.getElementById('detailCheckCircle').classList.toggle('checked');
    saveDetail();
  });

  // 메인 저장 버튼
  document.getElementById('saveBtn').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    const s = document.getElementById('saveStatus');
    s.textContent = '✓ 저장되었습니다';
    s.style.opacity = '1';
    setTimeout(() => { s.style.opacity = '0'; }, 2000);
  });

  // 월 이동
  document.getElementById('prevMonth').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    curMonth--;
    if (curMonth < 0) { curMonth = 11; curYear--; }
    if (selectedDay !== SPECIAL_TAB) {
      const dim = new Date(curYear, curMonth + 1, 0).getDate();
      if (selectedDay > dim) selectedDay = dim;
    }
    renderTabs(); renderMemoLines();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    saveData(curYear, curMonth, selectedDay, collectCurrentData());
    curMonth++;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (selectedDay !== SPECIAL_TAB) {
      const dim = new Date(curYear, curMonth + 1, 0).getDate();
      if (selectedDay > dim) selectedDay = dim;
    }
    renderTabs(); renderMemoLines();
  });

  // 안드로이드 뒤로가기 버튼 지원
  window.addEventListener('popstate', () => {
    if (document.getElementById('detailScreen').classList.contains('slide-in')) {
      saveDetail();
      closeDetail();
    }
  });
  // 상세 열릴 때 history 스택 추가
  const _openDetail = openDetail;

  // 담당자 드롭다운 외부 클릭 시 닫기
  document.addEventListener('click', () => {
    document.querySelectorAll('.person-dropdown.open').forEach(d => d.classList.remove('open'));
  });

  // ── 드래그 앤 드롭 (마우스 + 터치) ──
  (function initDnD() {
    let dragSrc = null;       // 드래그 중인 row 요소
    let dragIdx = -1;         // 드래그 시작 인덱스
    let overRow = null;       // 현재 hover 중인 row
    let overPos = null;       // 'top' | 'bottom'
    let ghost = null;         // 시각적 고스트 요소
    let touchOffsetY = 0;

    function getRows() {
      return Array.from(document.querySelectorAll('#memoLines .memo-line'));
    }

    function clearOver() {
      getRows().forEach(r => {
        r.classList.remove('drag-over-top', 'drag-over-bottom');
      });
    }

    function createGhost(row) {
      const g = row.cloneNode(true);
      g.style.cssText = `
        position: fixed; left: 0; top: 0; width: ${row.offsetWidth}px;
        pointer-events: none; z-index: 9999; opacity: 0.85;
        border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        background: #e8f0fb; transform: rotate(1.5deg);
        transition: none;
      `;
      document.body.appendChild(g);
      return g;
    }

    function moveGhost(x, y) {
      if (!ghost) return;
      ghost.style.left = x + 'px';
      ghost.style.top  = y + 'px';
    }

    function getRowAtPoint(clientY) {
      const rows = getRows();
      for (const r of rows) {
        if (r === dragSrc) continue;
        const rect = r.getBoundingClientRect();
        if (clientY >= rect.top && clientY <= rect.bottom) {
          const mid = rect.top + rect.height / 2;
          return { row: r, pos: clientY < mid ? 'top' : 'bottom' };
        }
      }
      return null;
    }

    function applyDrop() {
      if (!dragSrc || !overRow) return;
      const data = loadData(curYear, curMonth, selectedDay);

      // 현재 DOM 순서에서 인덱스 계산
      const rows = getRows();
      const srcDomIdx  = rows.indexOf(dragSrc);
      const destDomIdx = rows.indexOf(overRow);
      if (srcDomIdx === -1 || destDomIdx === -1) return;

      // 삽입 위치 결정
      let insertBefore = overPos === 'top' ? destDomIdx : destDomIdx + 1;
      if (insertBefore > srcDomIdx) insertBefore--;

      // 데이터 배열 재정렬 (lines, details, checked, persons)
      function reorder(arr) {
        const a = [...arr];
        const [item] = a.splice(srcDomIdx, 1);
        a.splice(insertBefore, 0, item);
        return a;
      }
      data.lines   = reorder(data.lines);
      data.details = reorder(data.details);
      data.checked = reorder(data.checked);
      data.persons = reorder(data.persons);

      saveData(curYear, curMonth, selectedDay, data);
      renderMemoLines();
    }

    function endDrag(apply) {
      if (ghost) { ghost.remove(); ghost = null; }
      clearOver();
      if (apply && dragSrc && overRow) applyDrop();
      if (dragSrc) dragSrc.classList.remove('dragging');
      dragSrc = null; dragIdx = -1; overRow = null; overPos = null;
    }

    // ── 마우스 이벤트 ──
    document.getElementById('memoLines').addEventListener('mousedown', e => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      e.preventDefault();
      dragSrc = handle.closest('.memo-line');
      dragIdx = parseInt(dragSrc.dataset.index);
      dragSrc.classList.add('dragging');
      const rect = dragSrc.getBoundingClientRect();
      ghost = createGhost(dragSrc);
      moveGhost(rect.left, rect.top);
    });

    document.addEventListener('mousemove', e => {
      if (!dragSrc) return;
      moveGhost(e.clientX - dragSrc.offsetWidth / 2, e.clientY - 20);
      const hit = getRowAtPoint(e.clientY);
      clearOver();
      if (hit) {
        overRow = hit.row; overPos = hit.pos;
        overRow.classList.add(overPos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
      } else {
        overRow = null; overPos = null;
      }
    });

    document.addEventListener('mouseup', () => {
      if (!dragSrc) return;
      endDrag(true);
    });

    // ── 터치 이벤트 ──
    document.getElementById('memoLines').addEventListener('touchstart', e => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      const touch = e.touches[0];
      dragSrc = handle.closest('.memo-line');
      dragIdx = parseInt(dragSrc.dataset.index);
      dragSrc.classList.add('dragging');
      const rect = dragSrc.getBoundingClientRect();
      touchOffsetY = touch.clientY - rect.top;
      ghost = createGhost(dragSrc);
      moveGhost(rect.left, rect.top);
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!dragSrc) return;
      e.preventDefault();
      const touch = e.touches[0];
      moveGhost(0, touch.clientY - touchOffsetY);
      ghost.style.width = '100%';
      const hit = getRowAtPoint(touch.clientY);
      clearOver();
      if (hit) {
        overRow = hit.row; overPos = hit.pos;
        overRow.classList.add(overPos === 'top' ? 'drag-over-top' : 'drag-over-bottom');
      } else {
        overRow = null; overPos = null;
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!dragSrc) return;
      endDrag(true);
    });
  })();

  // 초기화
  renderTabs();
  renderMemoLines();

  // PWA SW
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // PWA 설치 배너
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
  document.getElementById('installClose').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
  });
</script>
</body>
</html>
